<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Language Translation Studio</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="{{ url_for('home.index') }}">
      <span class="brand-mark">AI</span>
      <span>Language Studio</span>
    </a>
    <nav class="nav-links">
      <a href="{{ url_for('home.index') }}">Translate</a>
      <a href="{{ url_for('history.history') }}">History</a>
    </nav>
    <button class="icon-button" type="button" data-theme-toggle aria-label="Toggle theme" title="Toggle theme">
      <span data-theme-icon>Dark</span>
    </button>
  </header>
  <main class="shell">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="messages">
          {% for category, message in messages %}
            <p class="message {{ category }}">{{ message }}</p>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
